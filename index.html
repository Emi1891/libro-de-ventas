<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Libro de ventas</title>
<!-- Instalable como app (agregar a pantalla de inicio) -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Libro de ventas" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
<style>
  :root {
    --bg: #0a0a0a;
    --card: #161616;
    --card2: #222222;
    --text: #ededed;
    --muted: #9a9a9a;
    --accent: #D4A835;
    --accent-strong: #e0b73f;
    --ok: #22c55e;
    --err: #ef4444;
    --border: #333333;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 1.15rem; margin: 0; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .who { font-size: 0.8rem; color: var(--muted); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  main { max-width: 640px; margin: 0 auto; padding: 24px 20px 64px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin: 0 0 6px; }
  input, select {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    padding: 11px 12px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--card2);
    color: var(--text);
    font-size: 0.95rem;
  }
  /* Safari/iOS le da a input[type=date] un ancho intrínseco que se pasa de la card.
     Esto lo obliga a respetar el ancho de su contenedor. */
  input[type="date"] { -webkit-appearance: none; appearance: none; }
  input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .row > * { min-width: 0; }
  .full { grid-column: 1 / -1; }
  /* Stepper de cantidad: input reducido + botones - y + a la derecha */
  .stepper { display: flex; gap: 8px; align-items: stretch; }
  .stepper input { flex: 1 1 auto; min-width: 0; text-align: center; }
  /* Ocultar las flechitas nativas del input number (ya usamos los botones - y +) */
  .stepper input::-webkit-outer-spin-button,
  .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .stepper input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
  .step-btn {
    flex: 0 0 42px;
    width: 42px;
    background: var(--card2);
    color: var(--accent);
    border: 1px solid var(--border);
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1;
    padding: 0;
  }
  .step-btn:active { background: var(--accent); color: #1a1300; }
  button {
    cursor: pointer;
    border: none;
    border-radius: 9px;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 11px 16px;
    transition: filter .15s ease;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: var(--accent-strong); color: #1a1300; width: 100%; }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-icon { background: var(--card2); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; }
  .total {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin: 4px 0 18px;
    color: var(--accent);
  }
  .total small { display: block; font-size: 0.72rem; color: var(--muted); font-weight: 400; }
  #status {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 9px;
    font-size: 0.88rem;
    display: none;
  }
  #status.show { display: block; }
  #status.ok { background: rgba(34,197,94,.12); border: 1px solid var(--ok); color: #bbf7d0; }
  #status.err { background: rgba(239,68,68,.12); border: 1px solid var(--err); color: #fecaca; }
  #status.info { background: rgba(212,168,53,.12); border: 1px solid var(--accent); color: #f3e0a3; }
  .banner {
    background: rgba(212,168,53,.12);
    border: 1px solid var(--accent);
    color: #f3e0a3;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 18px;
    font-size: 0.88rem;
  }
  .hidden { display: none !important; }
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { margin: 0 0 4px; font-size: 1.05rem; }
  .modal p.hint { margin: 0 0 16px; font-size: 0.8rem; color: var(--muted); }
  .field { margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .modal-actions button { flex: 1; }
  code { background: var(--card2); padding: 1px 6px; border-radius: 5px; font-size: 0.82em; }

  /* En celular: apilar las filas de a dos columnas en una sola, e inputs más cómodos. */
  @media (max-width: 520px) {
    .row { grid-template-columns: 1fr; gap: 14px; }
    main { padding: 18px 14px 56px; }
    .card { padding: 16px; }
    /* font-size 16px evita el zoom automático de iOS al tocar un input */
    input, select { font-size: 16px; padding: 13px 12px; }
  }
</style>
</head>
<body>
<header>
  <h1 style="display:flex;align-items:center;gap:10px;">
    <img src="icons/icon-192.png" alt="SEMSA" width="32" height="32" style="border-radius:7px;" />
    SEMSA · Ventas
  </h1>
  <div class="header-right">
    <span class="who" id="who"></span>
    <button class="btn-icon" id="settingsBtn" title="Configuración">⚙</button>
  </div>
</header>

<main>
  <div class="banner hidden" id="setupBanner">
    Falta configurar la app. Tocá el botón <b>⚙</b> y pegá la URL del servidor (Apps Script).
  </div>

  <form id="saleForm" class="card">
    <div class="total" id="totalDisplay">$ 0<small>Total de la venta</small></div>

    <div class="row">
      <div>
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" required />
      </div>
      <div>
        <label for="cantidad">Cantidad</label>
        <div class="stepper">
          <input type="number" id="cantidad" min="1" step="1" value="1" inputmode="numeric" required />
          <button type="button" class="step-btn" id="cantMinus" aria-label="Restar uno">−</button>
          <button type="button" class="step-btn" id="cantPlus" aria-label="Sumar uno">+</button>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="full">
        <label for="producto">Producto</label>
        <input type="text" id="producto" placeholder="Camiseta titular Uruguay" required />
      </div>
    </div>

    <div class="row">
      <div>
        <label for="talle">Talle</label>
        <select id="talle">
          <option value="">— (opcional)</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
        </select>
      </div>
      <div>
        <label for="precio">Precio (unitario)</label>
        <input type="number" id="precio" min="0" step="0.01" placeholder="0.00" required />
      </div>
    </div>

    <div class="row">
      <div class="full">
        <label for="pago">Pago</label>
        <select id="pago" required>
          <option value="" disabled selected>— Elegí —</option>
          <option value="Pago completo">Pago completo</option>
          <option value="Seña">Seña</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="full">
        <label for="cliente">Cliente</label>
        <input type="text" id="cliente" placeholder="Nombre del cliente (opcional)" />
      </div>
    </div>

    <div class="row">
      <div class="full">
        <label for="vendedor">Responsable</label>
        <input type="text" id="vendedor" placeholder="Tu nombre" />
      </div>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">Registrar venta</button>
    <div id="status"></div>
  </form>
</main>

<!-- Settings modal -->
<div class="modal-backdrop" id="settingsModal">
  <div class="modal">
    <h2>Configuración</h2>
    <p class="hint">Se guarda en este navegador (localStorage). No se sube a ningún lado.</p>

    <div class="field">
      <label for="cfgUrl">URL del servidor (Apps Script Web App)</label>
      <input type="text" id="cfgUrl" placeholder="https://script.google.com/macros/s/AKf.../exec" />
    </div>
    <div class="field">
      <label for="cfgToken">Token (el mismo que pusiste en el Apps Script)</label>
      <input type="text" id="cfgToken" placeholder="Ej: ventas-2026" />
    </div>
    <div class="field">
      <label for="cfgVendedor">Tu nombre (responsable por defecto)</label>
      <input type="text" id="cfgVendedor" placeholder="Ej: Emi" />
    </div>

    <div class="modal-actions">
      <button class="btn-ghost" id="cfgCancel">Cancelar</button>
      <button class="btn-primary" id="cfgSave">Guardar</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- Config (localStorage) ----------
  var CFG_KEY = "libroVentasConfig";
  function loadConfig() {
    try { return JSON.parse(localStorage.getItem(CFG_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveConfig(cfg) { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
  var config = loadConfig();

  // ---------- DOM ----------
  var $ = function (id) { return document.getElementById(id); };
  var statusEl = $("status");

  function showStatus(msg, kind) {
    statusEl.textContent = msg;
    statusEl.className = "show " + (kind || "info");
  }
  function clearStatus() { statusEl.className = ""; statusEl.textContent = ""; }

  function refreshUI() {
    $("setupBanner").classList.toggle("hidden", !!config.url);
    $("who").textContent = config.vendedor || "";
    if (config.vendedor && !$("vendedor").value) $("vendedor").value = config.vendedor;
  }

  // ---------- Enviar venta al Apps Script ----------
  async function sendSale(payload) {
    // Content-Type text/plain evita el "preflight" CORS de Apps Script.
    var resp = await fetch(config.url, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
      redirect: "follow"
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    var data;
    try { data = await resp.json(); } catch (e) { data = null; }
    // El backend SIEMPRE devuelve JSON. Si no se pudo leer JSON, casi seguro Google
    // redirigió a una página de login: la implementación no está como "Cualquier persona".
    if (!data) {
      throw new Error("El servidor no respondió bien. Revisá que la implementación del Apps Script esté como \"Quién tiene acceso: Cualquier persona\".");
    }
    if (data.ok === false) throw new Error(data.error || "El servidor rechazó la venta");
    return data;
  }

  // ---------- Form ----------
  function recalcTotal() {
    var cant = parseFloat($("cantidad").value) || 0;
    var precio = parseFloat($("precio").value) || 0;
    var total = cant * precio;
    $("totalDisplay").innerHTML =
      "$ " + total.toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 2 }) +
      "<small>Total de la venta</small>";
  }

  function todayISO() {
    var d = new Date();
    var off = d.getTimezoneOffset();
    return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
  }

  async function onSubmit(e) {
    e.preventDefault();
    clearStatus();

    if (!config.url) {
      showStatus("Falta configurar la URL del servidor (⚙).", "err");
      return;
    }

    var cant = parseFloat($("cantidad").value) || 0;
    var precio = parseFloat($("precio").value) || 0;
    var vendedor = $("vendedor").value.trim();

    // El talle se asocia al nombre del producto antes de mandarlo a Sheets.
    var producto = $("producto").value.trim();
    var talle = $("talle").value;
    var productoConTalle = talle ? (producto + " - Talle " + talle) : producto;

    // Recordar el nombre del vendedor en este dispositivo.
    if (vendedor && vendedor !== config.vendedor) {
      config.vendedor = vendedor;
      saveConfig(config);
    }

    var payload = {
      token: config.token || "",
      fecha: $("fecha").value,
      producto: productoConTalle,
      cantidad: cant,
      precio: precio,
      cliente: $("cliente").value.trim(),
      pago: $("pago").value,
      total: cant * precio,
      vendedor: vendedor
    };

    var btn = $("submitBtn");
    btn.disabled = true;
    showStatus("Guardando venta…", "info");
    try {
      await sendSale(payload);
      showStatus("✓ Venta registrada.", "ok");
      // Reset parcial: dejo fecha y vendedor, limpio el resto.
      $("producto").value = "";
      $("talle").value = "";
      $("cantidad").value = "1";
      $("precio").value = "";
      $("cliente").value = "";
      $("pago").value = "";
      recalcTotal();
    } catch (err) {
      console.error(err);
      showStatus("Error al guardar: " + err.message, "err");
    } finally {
      btn.disabled = false;
    }
  }

  // ---------- Settings modal ----------
  function openSettings() {
    $("cfgUrl").value = config.url || "";
    $("cfgToken").value = config.token || "";
    $("cfgVendedor").value = config.vendedor || "";
    $("settingsModal").classList.add("show");
  }
  function closeSettings() { $("settingsModal").classList.remove("show"); }

  function saveSettings() {
    config.url = $("cfgUrl").value.trim();
    config.token = $("cfgToken").value.trim();
    config.vendedor = $("cfgVendedor").value.trim();
    saveConfig(config);
    closeSettings();
    refreshUI();
    showStatus("Configuración guardada.", "ok");
  }

  // ---------- Wire up ----------
  document.addEventListener("DOMContentLoaded", function () {
    $("fecha").value = todayISO();
    recalcTotal();
    refreshUI();

    $("settingsBtn").addEventListener("click", openSettings);
    $("cfgCancel").addEventListener("click", closeSettings);
    $("cfgSave").addEventListener("click", saveSettings);
    $("settingsModal").addEventListener("click", function (e) {
      if (e.target === $("settingsModal")) closeSettings();
    });

    $("cantidad").addEventListener("input", recalcTotal);
    $("precio").addEventListener("input", recalcTotal);
    $("saleForm").addEventListener("submit", onSubmit);

    function stepCantidad(delta) {
      var input = $("cantidad");
      var v = parseInt(input.value, 10);
      if (isNaN(v)) v = 0;
      v = Math.max(1, v + delta); // no baja de 1
      input.value = v;
      recalcTotal();
    }
    $("cantMinus").addEventListener("click", function () { stepCantidad(-1); });
    $("cantPlus").addEventListener("click", function () { stepCantidad(1); });
  });
})();
</script>
</body>
</html>
